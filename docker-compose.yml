version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: reword-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: reword

    ports:
      - "5434:5433"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
